# db -> api -> web (dépendances). DATABASE_URL et VITE_API_URL injectés.
# Les healthchecks garantissent l'ordre de démarrage réel : l'API attend que
# PostgreSQL accepte les connexions, le front attend que /health réponde.
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: credit_risk
      POSTGRES_USER: credit
      POSTGRES_PASSWORD: credit123
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U credit -d credit_risk"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./back-end
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://credit:credit123@db:5432/credit_risk
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      # python est présent dans l'image (pas de curl/wget dans slim)
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3)"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  web:
    build: ./front-end
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: http://localhost:8000
    depends_on:
      api:
        condition: service_healthy


volumes:
  pgdata:
