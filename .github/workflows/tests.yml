# =============================================================================
# Fichier : .github/workflows/tests.yml
# Rôle    : Définir la chaîne d'intégration continue : entraînement des modèles,
#           exécution des 25 tests et mesure de la couverture à chaque push/PR.
# Projet  : Prédiction du risque de crédit bancaire
# UE      : Outils libres pour le développement logiciel
# Auteur  : Maxime BRONNY - 19009314
# Version : V1
# Cadre   : Master 1 Big Data - Université Paris 8
# =============================================================================
# Le dataset et les scripts étant versionnés, make test entraîne les modèles
# (split + train) avant de lancer pytest, comme en local.
name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout du dépôt
        uses: actions/checkout@v4

      - name: Installation de Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Installation des dépendances
        run: |
          pip install -r back-end/requirements.txt
          pip install -r back-end/app/requirements.txt

      - name: Tests (pipeline ML + pytest)
        run: make test

      - name: Couverture de code
        run: make coverage
